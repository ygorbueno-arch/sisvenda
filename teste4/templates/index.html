<div class="content">
    <h2>Gestão de Estoque / Produtos</h2>
    
    <div class="card">
        <h3>Cadastrar Novo Produto</h3>
        <form method="POST">
            <input type="text" name="nome" placeholder="Nome do Produto" required>
            <input type="number" step="0.01" name="preco" placeholder="Preço" required>
            <input type="number" name="estoque" placeholder="Estoque Inicial" required>
            <button type="submit" class="btn-success">Salvar</button>
        </form>
    </div>

    <div class="card">
        <h3>Produtos em Estoque</h3>
        <table>
            <tr><th>ID</th><th>Nome</th><th>Preço</th><th>Qtd</th><th>Ação</th></tr>
            {% for p in produtos %}
            <tr>
                <td>{{ p.id }}</td>
                <td>{{ p.nome }}</td>
                <td>R$ {{ p.preco }}</td>
                <td>{{ p.estoque }}</td>
                <td>
                    <form action="/repor" method="POST" style="display:flex; gap:5px;">
                        <input type="hidden" name="id" value="{{ p.id }}">
                        <input type="number" name="quantidade" placeholder="Qtd" style="width:60px">
                        <button class="btn-action">Repor</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>
